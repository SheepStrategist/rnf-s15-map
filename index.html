<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>R&F Live Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0b0d08;
    --panel:#181b12;
    --panel-alt:#20241a;
    --paper:#ece5d2;
    --paper-dim:#9a917c;
    --brass:#c9a227;
    --brass-dim:#8f7a2e;
    --blood:#a83c32;
    --blood-bright:#c94f3f;
    --line:#383b2c;
    --shadow:rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--void);color:var(--paper);height:100%;overflow:hidden;}
  body{display:flex;flex-direction:column;height:100vh;height:100dvh;font-family:'Source Serif 4',Georgia,serif;}

  /* ---------- MAP ---------- */
  #map{flex:1 1 auto;min-height:0;background:var(--void);position:relative;}
  .leaflet-container{background:var(--void);}

  /* ---------- TITLE PLATE ---------- */
  #title-plate{
    position:absolute; top:14px; left:14px; z-index:1000;
    background:var(--panel); border:1px solid var(--brass-dim);
    padding:6px 16px; box-shadow:0 4px 14px var(--shadow);
  }
  #title-plate .t1{display:block;font-family:'Oswald',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.08em;color:var(--brass);}
  #title-plate .t2{display:block;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.28em;color:var(--paper-dim);margin-top:1px;}

  /* ---------- DOSSIER (layer control) ---------- */
  .dossier{
    position:absolute; top:14px; right:14px; z-index:1000;
    width:250px; max-width:calc(100vw - 28px);
    background:var(--panel); border:1px solid var(--brass-dim);
    box-shadow:0 8px 22px var(--shadow);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
  }
  .dossier::before{
    content:''; position:absolute; top:6px; left:6px; width:8px; height:8px; border-radius:50%;
    background:var(--brass); box-shadow:0 0 0 2px var(--void), inset 0 0 0 1px var(--brass-dim);
  }
  .dossier-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 10px 20px; cursor:pointer; user-select:none;
    font-family:'Oswald',sans-serif; font-weight:600; font-size:.82rem;
    letter-spacing:.12em; text-transform:uppercase; color:var(--brass);
  }
  .dossier-header .chevron{transition:transform .2s ease; font-size:.7rem; color:var(--paper-dim);}
  .dossier.collapsed .chevron{transform:rotate(-90deg);}
  .dossier-body{border-top:1px solid var(--line); max-height:56dvh; overflow-y:auto;}
  .dossier.collapsed .dossier-body{display:none;}

  .layer-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; border-top:1px solid var(--line);
    font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.03em;
  }
  .layer-row:first-child{border-top:none;}
  .switch{position:relative; width:34px; height:19px; flex:0 0 auto;}
  .switch input{position:absolute; inset:0; opacity:0; margin:0; cursor:pointer; z-index:2;}
  .switch .track{position:absolute; inset:0; background:var(--line); border-radius:10px; transition:background .15s;}
  .switch .thumb{position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%; background:var(--paper-dim); transition:transform .15s, background .15s;}
  .switch input:checked ~ .track{background:var(--brass-dim);}
  .switch input:checked ~ .thumb{transform:translateX(15px); background:var(--brass);}

  .legend{border-top:1px solid var(--brass-dim); padding:10px 14px 12px;}
  .legend-title{font-family:'Oswald',sans-serif; font-size:.66rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--paper-dim); margin-bottom:6px;}
  .legend-row{display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--paper-dim); padding:3px 0;}
  .legend-swatch{width:11px; height:11px; flex:0 0 auto; border:1px solid #12140d;}
  .legend-swatch.atrocity{background:var(--blood); border-radius:50%;}
  .legend-swatch.lopsided{background:transparent; border:2px solid var(--blood-bright);}
  .legend-swatch.pivotal{background:var(--brass); clip-path:polygon(50% 0,61% 38%,100% 38%,69% 60%,80% 100%,50% 76%,20% 100%,31% 60%,0 38%,39% 38%);}

  /* ---------- CONSOLE (bottom bar) ---------- */
  #console{
    flex:0 0 auto; background:var(--panel); border-top:2px solid var(--brass-dim);
    display:flex; align-items:center; gap:18px; padding:10px 20px;
    box-shadow:0 -4px 14px var(--shadow);
  }
  .year-block{font-family:'Oswald',sans-serif; font-weight:600; font-size:1.5rem; letter-spacing:.06em; min-width:118px; text-align:center; color:var(--paper);}
  .year-block small{display:block; font-family:'JetBrains Mono',monospace; font-size:.58rem; letter-spacing:.24em; color:var(--brass-dim); font-weight:500;}
  .timeline{flex:1 1 auto; min-width:0;}
  #slider{-webkit-appearance:none; width:100%; height:4px; background:var(--line); border-radius:2px; cursor:pointer; margin:0;}
  #slider::-webkit-slider-thumb{-webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--brass); border:2px solid var(--void); margin-top:-7px; cursor:pointer; box-shadow:0 2px 6px var(--shadow);}
  #slider::-moz-range-thumb{width:16px; height:16px; border-radius:50%; background:var(--brass); border:2px solid var(--void); cursor:pointer;}
  #slider::-moz-range-track{height:4px; background:var(--line); border-radius:2px;}
  .ticks{display:flex; justify-content:space-between; margin-top:4px; padding:0 2px; font-family:'JetBrains Mono',monospace; font-size:.6rem; color:var(--paper-dim); letter-spacing:.02em;}
  #sync-btn{
    flex:0 0 auto; display:flex; align-items:center; gap:6px;
    background:var(--panel-alt); color:var(--brass); border:1px solid var(--brass-dim);
    font-family:'Oswald',sans-serif; font-weight:600; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
    padding:10px 14px; cursor:pointer; transition:background .15s, transform .1s;
  }
  #sync-btn:hover{background:var(--brass-dim); color:var(--void);}
  #sync-btn:active{transform:scale(.96);}
  #sync-btn svg{width:14px; height:14px; flex:0 0 auto;}

  /* ---------- LEAFLET POPUP THEME ---------- */
  .leaflet-popup-content-wrapper{background:var(--panel); color:var(--paper); border:1px solid var(--brass-dim); border-radius:2px; box-shadow:0 8px 20px var(--shadow);}
  .leaflet-popup-tip{background:var(--panel); border:1px solid var(--brass-dim); box-shadow:none;}
  .leaflet-popup-content{margin:12px 14px; min-width:160px;}
  .leaflet-popup-content h3{font-family:'Oswald',sans-serif; font-weight:600; font-size:1rem; letter-spacing:.02em; color:var(--brass); margin:0 0 4px;}
  .leaflet-popup-content .popup-meta{font-family:'JetBrains Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; color:var(--paper-dim); margin:0 0 6px;}
  .leaflet-popup-content p{font-family:'Source Serif 4',Georgia,serif; font-size:.85rem; line-height:1.45; color:var(--paper); margin:0;}
  .leaflet-popup-content .popup-flags{margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;}
  .leaflet-popup-content .popup-flags span{font-family:'JetBrains Mono',monospace; font-size:.58rem; text-transform:uppercase; letter-spacing:.05em; padding:2px 6px; border:1px solid var(--blood); color:var(--blood-bright);}
  .leaflet-popup-close-button{color:var(--paper-dim) !important;}

  .operation-label{background:none; border:none; box-shadow:none; padding:0; font-family:'Oswald',sans-serif; font-weight:600; font-size:.65rem; letter-spacing:.06em; text-transform:uppercase; color:var(--paper); text-shadow:0 0 4px #000, 0 0 6px #000;}
  .operation-label::before{display:none;}
  path.territory-border{transition:stroke-width .12s ease, fill-opacity .12s ease;}
  .leaflet-div-icon.engagement-icon{background:transparent; border:none;}

  /* ---------- MOBILE ---------- */
  @media (max-width:680px){
    #title-plate{padding:5px 10px; top:10px; left:10px;}
    #title-plate .t1{font-size:.95rem;}
    #title-plate .t2{font-size:.5rem; letter-spacing:.2em;}

    .dossier{top:auto; bottom:10px; left:10px; right:10px; width:auto; clip-path:none; border-radius:8px 8px 0 0;}
    .dossier::before{display:none;}
    .dossier-body{max-height:38dvh;}

    #console{flex-wrap:wrap; padding:8px 12px; gap:8px;}
    .year-block{min-width:0; width:100%; order:1; font-size:1.3rem;}
    .timeline{order:2; width:100%; flex:1 1 100%;}
    #sync-btn{order:3; flex:1 1 auto; justify-content:center;}
    .ticks span:not(:first-child):not(:last-child){display:none;}
  }
</style>
</head>
<body>

  <div id="map">
    <div id="title-plate">
      <span class="t1">R&amp;F</span>
      <span class="t2">LIVE MAP</span>
    </div>

    <div class="dossier" id="dossier">
      <div class="dossier-header" id="dossier-header">
        <span>Map layers</span>
        <span class="chevron">&#9662;</span>
      </div>
      <div class="dossier-body" id="dossier-body"></div>
      <div class="legend">
        <div class="legend-title">Engagement key</div>
        <div class="legend-row"><span class="legend-swatch atrocity"></span>War crime</div>
        <div class="legend-row"><span class="legend-swatch lopsided"></span>Lopsided</div>
        <div class="legend-row"><span class="legend-swatch pivotal"></span>Pivotal</div>
      </div>
    </div>
  </div>

  <div id="console">
    <div class="year-block" id="year-display"><small>Year</small>----</div>
    <div class="timeline">
      <input type="range" id="slider" min="0" value="0" step="1">
      <div class="ticks" id="ticks"></div>
    </div>
    <button id="sync-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7M21 3v6h-6"/></svg>
      Refresh
    </button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-ant-path/dist/leaflet-ant-path.min.js"></script>
  <script>
    // ============================================================
    // 1. MAP INIT
    // ============================================================
    var map = L.map('map', { zoomControl: false }).setView([40.0, 15.0], 4);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    L.tileLayer('tiles/{z}/{x}/{y}.jpg', {
        minZoom: 0, maxZoom: 8, noWrap: true,
        bounds: [[-90, -180], [90, 180]]
    }).addTo(map);

    var customIcons = {
        "capital": L.icon({ iconUrl: 'art/Capital_Icon.png', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] }),
        "city": L.icon({ iconUrl: 'art/City_Icon.png', iconSize: [20, 20], iconAnchor: [10, 20], popupAnchor: [0, -20] }),
        "wonder": L.icon({ iconUrl: 'art/Wonder_Icon.png', iconSize: [35, 35], iconAnchor: [17, 35], popupAnchor: [0, -35] }),
        "holy_site": L.icon({ iconUrl: 'art/HolySite_Icon.png', iconSize: [25, 25], iconAnchor: [12, 25], popupAnchor: [0, -25] }),
        "chokepoint": L.icon({ iconUrl: 'art/Chokepoint_Icon.png', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] })
    };

    // ============================================================
    // 2. LAYER GROUPS + DOSSIER PANEL (built from one config list)
    // ============================================================
    var LAYER_DEFS = [
        { key: 'capitals',    label: 'Capitals',            match: f => f.geometry.type === 'Point' && f.properties.marker_type === 'capital' },
        { key: 'cities',      label: 'Cities',               match: f => f.geometry.type === 'Point' && (f.properties.marker_type === 'city' || !f.properties.marker_type) },
        { key: 'holy_sites',  label: 'Holy sites',           match: f => f.properties.marker_type === 'holy_site' },
        { key: 'wonders',     label: 'Wonders',               match: f => f.properties.marker_type === 'wonder' },
        { key: 'chokepoints', label: 'Chokepoints',           match: f => f.properties.marker_type === 'chokepoint' },
        { key: 'territories', label: 'National territories',  match: f => f.geometry.type !== 'Point' }
    ];
    var FRONTLINE_DEFS = [
        { key: 'frontline',   label: 'Active frontline',      role: 'frontline' },
        { key: 'advances',    label: 'Offensives & convoys',   role: 'advance' },
        { key: 'greyzone',    label: 'Grey zone',              role: 'grey_zone' },
        { key: 'operations',  label: 'Operations (historical)',role: 'operation_gain' },
        { key: 'engagements', label: 'Engagements',            role: 'engagement' }
    ];
    var ALL_DEFS = LAYER_DEFS.concat(FRONTLINE_DEFS);

    var layerGroups = {};
    ALL_DEFS.forEach(function (def) {
        layerGroups[def.key] = L.layerGroup().addTo(map);
    });

    var dossierBody = document.getElementById('dossier-body');
    ALL_DEFS.forEach(function (def) {
        var row = document.createElement('label');
        row.className = 'layer-row';
        row.innerHTML =
            '<span>' + def.label + '</span>' +
            '<span class="switch">' +
                '<input type="checkbox" checked data-layer="' + def.key + '">' +
                '<span class="track"></span><span class="thumb"></span>' +
            '</span>';
        dossierBody.appendChild(row);
    });
    dossierBody.addEventListener('change', function (e) {
        var key = e.target.getAttribute('data-layer');
        if (!key) return;
        if (e.target.checked) map.addLayer(layerGroups[key]);
        else map.removeLayer(layerGroups[key]);
    });

    var dossier = document.getElementById('dossier');
    document.getElementById('dossier-header').addEventListener('click', function () {
        dossier.classList.toggle('collapsed');
    });
    if (window.innerWidth <= 680) dossier.classList.add('collapsed');

    // ============================================================
    // 3. POPUP + ICON HELPERS
    // ============================================================
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
        });
    }
    function buildPopup(props) {
        var html = '';
        if (props.name) html += '<h3>' + escapeHtml(props.name) + '</h3>';
        var meta = [];
        if (props.engagement_type) meta.push(props.engagement_type.replace(/_/g, ' '));
        if (props.date) meta.push(props.date);
        if (props.date_range) meta.push(props.date_range);
        if (meta.length) html += '<div class="popup-meta">' + meta.map(escapeHtml).join(' &middot; ') + '</div>';
        if (props.description) html += '<p>' + escapeHtml(props.description) + '</p>';
        var flags = [];
        if (props.atrocity) flags.push('war crime');
        if (props.lopsided) flags.push('lopsided');
        if (props.pivotal) flags.push('pivotal');
        if (flags.length) html += '<div class="popup-flags">' + flags.map(function (f) { return '<span>' + f + '</span>'; }).join('') + '</div>';
        return html;
    }

    var ENGAGEMENT_VISUALS = {
        skirmish:            ['diamond', '#a83c32', 'SK'],
        engagement:          ['diamond', '#a83c32', 'EN'],
        siege:               ['diamond', '#a83c32', 'SG'],
        encirclement:        ['diamond', '#a83c32', 'EC'],
        breakthrough:        ['diamond', '#a83c32', 'BT'],
        ambush:              ['diamond', '#a83c32', 'AM'],
        raid:                ['diamond', '#a83c32', 'RD'],
        sabotage:            ['circle',  '#5b4a7a', 'SB'],
        assassination:       ['circle',  '#5b4a7a', 'AS'],
        naval_engagement:    ['circle',  '#3d6a7a', 'NV'],
        blockade:            ['circle',  '#3d6a7a', 'BL'],
        bombardment:         ['triangle','#c9a227', 'BM'],
        uprising:            ['square',  '#7a7440', 'UP'],
        mutiny:              ['square',  '#7a7440', 'MT'],
        coup:                ['square',  '#7a7440', 'CP'],
        withdrawal:          ['square',  '#7a7440', 'WD'],
        ceasefire_violation: ['square',  '#7a7440', 'CV']
    };
    function buildEngagementIcon(props) {
        var v = ENGAGEMENT_VISUALS[props.engagement_type] || ENGAGEMENT_VISUALS.engagement;
        var shape = v[0], color = v[1], glyph = v[2];
        var shapeSvg = '';
        if (shape === 'diamond') shapeSvg = '<rect x="7" y="7" width="18" height="18" transform="rotate(45 16 16)" fill="' + color + '" stroke="#12140d" stroke-width="1.5"/>';
        else if (shape === 'circle') shapeSvg = '<circle cx="16" cy="16" r="11" fill="' + color + '" stroke="#12140d" stroke-width="1.5"/>';
        else if (shape === 'triangle') shapeSvg = '<polygon points="16,5 27,25 5,25" fill="' + color + '" stroke="#12140d" stroke-width="1.5"/>';
        else shapeSvg = '<rect x="6" y="6" width="20" height="20" fill="' + color + '" stroke="#12140d" stroke-width="1.5"/>';
        var ring = props.lopsided ? '<circle cx="16" cy="16" r="15" fill="none" stroke="#c94f3f" stroke-width="1" opacity=".6"/>' : '';
        var badge = props.atrocity ? '<circle cx="26" cy="6" r="5" fill="#a83c32" stroke="#12140d" stroke-width="1"/><text x="26" y="8.5" font-size="7" text-anchor="middle" fill="#ece5d2" font-family="JetBrains Mono">!</text>' : '';
        var star = props.pivotal ? '<polygon points="16,1 18,6 23,6 19,9 20,14 16,11 12,14 13,9 9,6 14,6" fill="#c9a227"/>' : '';
        var svg = '<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">' + ring + shapeSvg +
            '<text x="16" y="20" font-size="8" text-anchor="middle" fill="#ece5d2" font-family="JetBrains Mono" font-weight="700">' + glyph + '</text>' +
            badge + star + '</svg>';
        return L.divIcon({ html: svg, className: 'engagement-icon', iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16] });
    }

    function ensureHatchDefs() {
        var svg = document.querySelector('.leaflet-overlay-pane svg');
        if (!svg || svg.querySelector('#hatchPattern')) return;
        var ns = 'http://www.w3.org/2000/svg';
        var defs = document.createElementNS(ns, 'defs');
        defs.innerHTML =
            '<pattern id="hatchPattern" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">' +
            '<rect width="8" height="8" fill="#4a4a3e" fill-opacity="0.15"/>' +
            '<line x1="0" y1="0" x2="0" y2="8" stroke="#9a917c" stroke-width="2" stroke-opacity="0.35"/>' +
            '</pattern>';
        svg.insertBefore(defs, svg.firstChild);
    }

    // ============================================================
    // 4. YEAR SNAPSHOT LOADER (nations, cities, wonders, etc.)
    // ============================================================
    var availableYears = [1980, 1983, 1989, 1990, 1992];
    var slider = document.getElementById('slider');
    slider.max = availableYears.length - 1;

    var ticksEl = document.getElementById('ticks');
    availableYears.forEach(function (y) {
        var s = document.createElement('span');
        s.textContent = y;
        ticksEl.appendChild(s);
    });

    function updateMap(year) {
        document.getElementById('year-display').innerHTML = '<small>Year</small>' + year;

        LAYER_DEFS.forEach(function (def) { layerGroups[def.key].clearLayers(); });

        var fileUrl = year + '_data.geojson?nocache=' + new Date().getTime();
        fetch(fileUrl)
            .then(function (response) {
                if (!response.ok) throw new Error('File not found for year ' + year);
                return response.json();
            })
            .then(function (data) {
                LAYER_DEFS.forEach(function (def) {
                    if (def.key === 'territories') return; // handled separately, see buildTerritories
                    L.geoJSON(data, {
                        filter: def.match,
                        pointToLayer: function (feature, latlng) {
                            var type = feature.properties.marker_type || 'city';
                            var selectedIcon = customIcons[type] || customIcons['city'];
                            return L.marker(latlng, { icon: selectedIcon });
                        },
                        onEachFeature: function (feature, layer) {
                            if (feature.properties && feature.properties.name) {
                                layer.bindPopup(buildPopup(feature.properties));
                            }
                        }
                    }).addTo(layerGroups[def.key]);
                });
                buildTerritories(data);
            })
            .catch(function (err) { console.error(err); });
    }

    // Nations get a two-pass border (soft outer halo + crisp inner line),
    // a hover highlight, and a curved, axis-fit name label — instead of
    // a single flat outline with a straight centered label.
    function buildTerritories(data) {
        var territoryFeatures = {
            type: 'FeatureCollection',
            features: data.features.filter(function (f) { return f.geometry.type !== 'Point'; })
        };

        L.geoJSON(territoryFeatures, {
            style: function (feature) {
                return {
                    color: feature.properties.color || '#c9a227',
                    weight: 9, opacity: 0.16, fill: false, lineJoin: 'round'
                };
            },
            interactive: false
        }).addTo(layerGroups.territories);

        var crisp = L.geoJSON(territoryFeatures, {
            style: function (feature) {
                return {
                    className: 'territory-border',
                    color: feature.properties.color || '#c9a227',
                    weight: 2, opacity: 1, lineJoin: 'round',
                    fillColor: feature.properties.color || '#c9a227', fillOpacity: 0.22
                };
            },
            onEachFeature: function (feature, layer) {
                var props = feature.properties || {};
                if (props.name) layer.bindPopup(buildPopup(props));
                layer.on('mouseover', function () {
                    layer.setStyle({ weight: 4, fillOpacity: 0.4 });
                    layer.bringToFront();
                });
                layer.on('mouseout', function () { crisp.resetStyle(layer); });
            }
        }).addTo(layerGroups.territories);

        territoryFeatures.features.forEach(function (feature) {
            var props = feature.properties || {};
            if (!props.name) return;
            var ring = getLargestRing(feature.geometry);
            if (!ring || ring.length < 4) return;
            new NationLabel(ring, props.name, props.color || '#c9a227').addTo(layerGroups.territories);
        });
    }

    // ---- Geometry helpers for curved, axis-fit nation labels ----

    // Picks the outer ring of the largest part of a Polygon/MultiPolygon
    // (relative area in raw lng/lat units — fine, we only need "biggest").
    function getLargestRing(geometry) {
        var rings = geometry.type === 'Polygon' ? [geometry.coordinates[0]]
            : geometry.type === 'MultiPolygon' ? geometry.coordinates.map(function (poly) { return poly[0]; })
            : null;
        if (!rings) return null;
        var best = null, bestArea = -1;
        rings.forEach(function (ring) {
            var a = 0;
            for (var i = 0; i < ring.length; i++) {
                var p1 = ring[i], p2 = ring[(i + 1) % ring.length];
                a += p1[0] * p2[1] - p2[0] * p1[1];
            }
            a = Math.abs(a);
            if (a > bestArea) { bestArea = a; best = ring; }
        });
        return best;
    }

    // Smooth curve through points via Catmull-Rom -> cubic Bezier conversion.
    function smoothPathThrough(pts) {
        var d = 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1) + ' ';
        for (var i = 0; i < pts.length - 1; i++) {
            var p0 = pts[i - 1] || pts[i];
            var p1 = pts[i];
            var p2 = pts[i + 1];
            var p3 = pts[i + 2] || p2;
            var c1x = p1.x + (p2.x - p0.x) / 6, c1y = p1.y + (p2.y - p0.y) / 6;
            var c2x = p2.x - (p3.x - p1.x) / 6, c2y = p2.y - (p3.y - p1.y) / 6;
            d += 'C' + c1x.toFixed(1) + ',' + c1y.toFixed(1) + ' ' + c2x.toFixed(1) + ',' + c2y.toFixed(1) + ' ' + p2.x.toFixed(1) + ',' + p2.y.toFixed(1) + ' ';
        }
        return d;
    }

    // A country name that: (1) sits along the polygon's longest axis,
    // (2) bends to trace the country's actual cross-sectional midline
    // rather than a straight chord, and (3) scales font size to the
    // available length and width. Recomputed on zoom since pixel
    // geometry changes with the map's projection scale.
    var NationLabel = L.Layer.extend({
        initialize: function (ring, text, color) {
            this._ring = ring;
            this._text = text.toUpperCase();
            this._color = color;
        },
        onAdd: function (map) {
            this._map = map;
            var svg = map.getPane('overlayPane').querySelector('svg');
            var host = (svg && svg.querySelector('g')) || svg;
            var ns = 'http://www.w3.org/2000/svg';
            var id = 'nation-path-' + Math.random().toString(36).slice(2);

            this._defs = document.createElementNS(ns, 'defs');
            this._path = document.createElementNS(ns, 'path');
            this._path.setAttribute('id', id);
            this._path.setAttribute('fill', 'none');
            this._defs.appendChild(this._path);

            this._textEl = document.createElementNS(ns, 'text');
            this._textEl.setAttribute('fill', this._color);
            this._textEl.setAttribute('paint-order', 'stroke');
            this._textEl.setAttribute('stroke', '#0b0d08');
            this._textEl.setAttribute('stroke-linejoin', 'round');
            this._textEl.setAttribute('font-family', "'Oswald', sans-serif");
            this._textEl.setAttribute('font-weight', '700');
            this._textEl.style.pointerEvents = 'none';

            var tp = document.createElementNS(ns, 'textPath');
            tp.setAttribute('href', '#' + id);
            tp.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', '#' + id);
            tp.setAttribute('startOffset', '50%');
            tp.setAttribute('text-anchor', 'middle');
            tp.textContent = this._text;
            this._textEl.appendChild(tp);

            host.appendChild(this._defs);
            host.appendChild(this._textEl);

            map.on('zoomend viewreset', this._update, this);
            this._update();
            return this;
        },
        onRemove: function (map) {
            map.off('zoomend viewreset', this._update, this);
            if (this._defs.parentNode) this._defs.parentNode.removeChild(this._defs);
            if (this._textEl.parentNode) this._textEl.parentNode.removeChild(this._textEl);
        },
        _update: function () {
            var map = this._map;
            var pts = this._ring.map(function (c) { return map.latLngToLayerPoint([c[1], c[0]]); });
            var n = pts.length;

            // Area-weighted centroid (shoelace formula).
            var A = 0, cx = 0, cy = 0;
            for (var i = 0; i < n; i++) {
                var p1 = pts[i], p2 = pts[(i + 1) % n];
                var cross = p1.x * p2.y - p2.x * p1.y;
                A += cross; cx += (p1.x + p2.x) * cross; cy += (p1.y + p2.y) * cross;
            }
            A *= 0.5;
            var centroid;
            if (Math.abs(A) < 1e-6) {
                var sx = 0, sy = 0; pts.forEach(function (p) { sx += p.x; sy += p.y; });
                centroid = { x: sx / n, y: sy / n };
            } else {
                centroid = { x: cx / (6 * A), y: cy / (6 * A) };
            }

            // Principal axis via edge-length-weighted covariance (PCA).
            var Sxx = 0, Syy = 0, Sxy = 0, wsum = 0;
            for (i = 0; i < n; i++) {
                var a = pts[i], b = pts[(i + 1) % n];
                var mx = (a.x + b.x) / 2 - centroid.x, my = (a.y + b.y) / 2 - centroid.y;
                var len = Math.hypot(b.x - a.x, b.y - a.y) || 0.0001;
                Sxx += len * mx * mx; Syy += len * my * my; Sxy += len * mx * my; wsum += len;
            }
            Sxx /= wsum; Syy /= wsum; Sxy /= wsum;
            var theta = 0.5 * Math.atan2(2 * Sxy, Sxx - Syy);
            var dir = { x: Math.cos(theta), y: Math.sin(theta) };
            var perp = { x: -Math.sin(theta), y: Math.cos(theta) };

            // Oriented bounding box along that axis -> longest possible span.
            var minD = Infinity, maxD = -Infinity, minP = Infinity, maxP = -Infinity;
            pts.forEach(function (p) {
                var dx = p.x - centroid.x, dy = p.y - centroid.y;
                var pd = dx * dir.x + dy * dir.y, pp = dx * perp.x + dy * perp.y;
                if (pd < minD) minD = pd; if (pd > maxD) maxD = pd;
                if (pp < minP) minP = pp; if (pp > maxP) maxP = pp;
            });
            var axisLen = maxD - minD, axisWidth = maxP - minP;
            var axisCenter = (maxD + minD) / 2;

            if (axisLen < 14) { this._hide(); return; }

            var shrink = 0.82;
            var half = (axisLen * shrink) / 2;
            var startAlong = axisCenter - half, endAlong = axisCenter + half;

            // Sample cross-sections along the axis to find the country's
            // actual midline (where it narrows/bulges), not just a straight chord.
            var SLICES = 5, spine = [];
            for (i = 0; i < SLICES; i++) {
                var t = i / (SLICES - 1);
                var along = startAlong + (endAlong - startAlong) * t;
                var base = { x: centroid.x + dir.x * along, y: centroid.y + dir.y * along };
                var lo = null, hi = null;
                for (var e = 0; e < n; e++) {
                    var a2 = pts[e], b2 = pts[(e + 1) % n];
                    var ex = b2.x - a2.x, ey = b2.y - a2.y;
                    var det = -perp.x * ey + ex * perp.y;
                    if (Math.abs(det) < 1e-9) continue;
                    var rhsX = a2.x - base.x, rhsY = a2.y - base.y;
                    var s = (-rhsX * ey + ex * rhsY) / det;
                    var u = (perp.x * rhsY - perp.y * rhsX) / det;
                    if (u >= 0 && u <= 1) {
                        if (lo === null || s < lo) lo = s;
                        if (hi === null || s > hi) hi = s;
                    }
                }
                var mid = (lo !== null && hi !== null) ? (lo + hi) / 2 : 0;
                spine.push({ x: base.x + perp.x * mid, y: base.y + perp.y * mid });
            }
            if (spine[0].x > spine[spine.length - 1].x) spine.reverse();

            var fontByLength = (axisLen * shrink * 0.94) / Math.max(this._text.length, 1) / 0.56;
            var fontByWidth = axisWidth * 0.85;
            var fontSize = Math.max(9, Math.min(fontByLength, fontByWidth, 64));

            this._path.setAttribute('d', smoothPathThrough(spine));
            this._textEl.setAttribute('font-size', fontSize.toFixed(1));
            this._textEl.setAttribute('stroke-width', (fontSize * 0.16).toFixed(1));
            this._textEl.setAttribute('letter-spacing', (fontSize * 0.03).toFixed(1));
            this._textEl.style.display = '';
        },
        _hide: function () { this._textEl.style.display = 'none'; }
    });
    updateMap(availableYears[0]);

    slider.addEventListener('input', function (e) {
        updateMap(availableYears[parseInt(e.target.value, 10)]);
    });
    document.getElementById('sync-btn').addEventListener('click', function () {
        window.location.reload(true);
    });

    // ============================================================
    // 5. FRONTLINE OVERLAY (independent of the year slider)
    //    Expects frontlines_current.geojson with features tagged by
    //    properties.feature_role: frontline | advance | grey_zone |
    //    operation_gain | engagement  (see accompanying sample file)
    // ============================================================
    function loadFrontlines() {
        fetch('frontlines_current.geojson?nocache=' + new Date().getTime())
            .then(function (response) {
                if (!response.ok) throw new Error('No frontline data found');
                return response.json();
            })
            .then(function (data) {
                (data.features || []).forEach(function (feature) {
                    var props = feature.properties || {};
                    var role = props.feature_role;
                    var latlngs;

                    if (role === 'frontline' || role === 'advance') {
                        latlngs = feature.geometry.coordinates.map(function (c) { return [c[1], c[0]]; });
                    }

                    if (role === 'advance') {
                        var isTrade = props.kind === 'trade';
                        var advance = L.polyline.antPath(latlngs, {
                            color: isTrade ? '#c9a227' : '#c94f3f',
                            pulseColor: '#ece5d2',
                            delay: isTrade ? 1300 : 650,
                            dashArray: [8, 16],
                            weight: 4
                        }).addTo(layerGroups.advances);
                        if (props.name || props.description) advance.bindPopup(buildPopup(props));

                    } else if (role === 'frontline') {
                        var line;
                        if (props.active) {
                            line = L.polyline.antPath(latlngs, { color: '#a83c32', pulseColor: '#ece5d2', delay: 750, dashArray: [10, 12], weight: 5 });
                        } else {
                            line = L.polyline(latlngs, { color: '#a83c32', weight: 5, opacity: 0.9 });
                        }
                        line.addTo(layerGroups.frontline);
                        if (props.name || props.description) line.bindPopup(buildPopup(props));

                    } else if (role === 'grey_zone') {
                        var gz = L.geoJSON(feature, {
                            style: function () { return { className: 'grey-zone-fill', color: '#9a917c', weight: 1, dashArray: '4,6', fillOpacity: 0.35 }; }
                        }).addTo(layerGroups.greyzone);
                        if (props.name || props.description) gz.bindPopup(buildPopup(props));
                        ensureHatchDefs();

                    } else if (role === 'operation_gain') {
                        var op = L.geoJSON(feature, {
                            style: function () { return { color: props.color || '#c9a227', weight: 2, fillColor: props.color || '#c9a227', fillOpacity: 0.22 }; }
                        }).addTo(layerGroups.operations);
                        op.bindTooltip(props.operation_name || props.name || 'Operation', { permanent: true, direction: 'center', className: 'operation-label' });
                        op.bindPopup(buildPopup(Object.assign({ name: props.operation_name || props.name }, props)));

                    } else if (role === 'engagement') {
                        var latlng = [feature.geometry.coordinates[1], feature.geometry.coordinates[0]];
                        L.marker(latlng, { icon: buildEngagementIcon(props) })
                            .bindPopup(buildPopup(props))
                            .addTo(layerGroups.engagements);
                    }
                });
            })
            .catch(function (err) { console.warn('Frontline layer not loaded:', err.message); });
    }
    loadFrontlines();
  </script>
</body>
