<!DOCTYPE html>
<html>
<head>
    <title>R&F Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 90vh; width: 100vw; }
        #controls { height: 10vh; display: flex; align-items: center; justify-content: center; background: #111; border-top: 2px solid #333; }
        #slider { width: 60%; margin: 0 20px; cursor: pointer; }
        .label { font-size: 1.5rem; font-weight: bold; width: 180px; text-align: center; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="controls">
        <div class="label" id="year-display">Year: ----</div>
        <input type="range" id="slider" min="0" value="0" step="1">
        <button id="sync-btn" style="padding: 10px; margin-left: 20px; cursor: pointer; background: #336699; color: white; border: none; border-radius: 5px; font-weight: bold;">Refresh Map</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map
        var map = L.map('map').setView([40.0, 15.0], 4);

        // 2. Custom QGIS Base Layer
        L.tileLayer('tiles/{z}/{x}/{y}.jpg', {
            minZoom: 0,
            maxZoom: 8, 
            noWrap: true, 
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        // Custom Marker Dictionary
        var customIcons = {
            "capital": L.icon({ iconUrl: 'art/Capital_Icon.png', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] }),
            "city": L.icon({ iconUrl: 'art/City_Icon.png', iconSize: [20, 20], iconAnchor: [10, 20], popupAnchor: [0, -20] }),
            "wonder": L.icon({ iconUrl: 'art/Wonder_Icon.png', iconSize: [35, 35], iconAnchor: [17, 35], popupAnchor: [0, -35] }),
            "holy_site": L.icon({ iconUrl: 'art/HolySite_Icon.png', iconSize: [25, 25], iconAnchor: [12, 25], popupAnchor: [0, -25] }),
            "chokepoint": L.icon({ iconUrl: 'art/Chokepoint_Icon.png', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] })
        };
        
        var geojsonLayer;

        // --- NEW: Definitive Chronology Array ---
        // Simply add your new file years directly to this list as you create them
        var availableYears = [1980, 1983, 1989, 1990, 1992];

        // Configure slider range dynamically based on array length
        var slider = document.getElementById('slider');
        slider.max = availableYears.length - 1;

        // Load the initial map snapshot (the first year in your array)
        updateMap(availableYears[0]);

        // 3. Dynamic Snapshot Loader
        function updateMap(year) {
            document.getElementById('year-display').innerText = "Year: " + year;
            
            if (geojsonLayer) {
                map.removeLayer(geojsonLayer);
            }

            // Construct file URL cleanly using the selected year variable
            var fileUrl = year + '_data.geojson?nocache=' + new Date().getTime();

            fetch(fileUrl)
                .then(response => {
                    if (!response.ok) throw new Error("File not found for year " + year);
                    return response.json();
                })
                .then(data => {
                    // Draw the data directly—no more filtering loops required!
                    geojsonLayer = L.geoJSON(data, {
                        style: function(feature) {
                            return {
                                color: feature.properties.color || "#ffaa00", 
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.3
                            };
                        },
                        pointToLayer: function(feature, latlng) {
                            var type = feature.properties.marker_type || "city";
                            var selectedIcon = customIcons[type] || customIcons["city"]; 
                            return L.marker(latlng, { icon: selectedIcon });
                        },
                        onEachFeature: function(feature, layer) {
                            if (feature.properties && feature.properties.name) {
                                let popupHtml = "<h3 style='color:black; margin:0;'>" + feature.properties.name + "</h3>";
                                if (feature.properties.description) {
                                    popupHtml += "<p style='color:black; margin-top:5px; font-size:14px;'>" + feature.properties.description + "</p>";
                                }
                                layer.bindPopup(popupHtml);
                            }
                        }
                    }).addTo(map);
                })
                .catch(err => console.error(err));
        }

        // 4. Map the Slider Index to the Year Array
        slider.addEventListener('input', function(e) {
            var selectedIndex = parseInt(e.target.value);
            var targetYear = availableYears[selectedIndex];
            updateMap(targetYear);
        });

        document.getElementById('sync-btn').addEventListener('click', function() {
            window.location.reload(true); 
        });
    </script>
</body>
</html>
