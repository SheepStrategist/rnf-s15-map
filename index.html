<!DOCTYPE html>
<html>
<head>
    <title>R&F Tactical War Room</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-measure/3.1.0/leaflet-measure.css" />
    
    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: white; font-family: monospace; }
        #map { height: 90vh; width: 100vw; background: #0a0a0a; }
        #controls { height: 10vh; display: flex; align-items: center; justify-content: center; background: #111; border-top: 2px solid #3fe0c2; }
        #slider { width: 50%; margin: 0 20px; cursor: pointer; accent-color: #3fe0c2; }
        .label { font-size: 1.2rem; font-weight: bold; width: 180px; text-align: center; color: #3fe0c2; }
        .btn { padding: 8px 15px; cursor: pointer; background: #021a1a; color: #3fe0c2; border: 1px solid #3fe0c2; border-radius: 3px; font-weight: bold; font-family: monospace; }
        .btn:hover { background: #3fe0c2; color: #050505; }
        
        /* 🐜 THE MARCHING ANTS CSS ANIMATION */
        .marching-ants {
            stroke-dasharray: 15, 15;
            animation: march 1s linear infinite;
        }
        @keyframes march {
            0% { stroke-dashoffset: 30; }
            100% { stroke-dashoffset: 0; }
        }
        
        /* Custom UI tweaks for the Leaflet plugins */
        .leaflet-control-measure { background: rgba(1, 8, 8, 0.9) !important; color: #3fe0c2 !important; border: 1px solid #3fe0c2 !important; }
        .leaflet-control-layers { background: rgba(1, 8, 8, 0.9) !important; color: #3fe0c2 !important; border: 1px solid #3fe0c2 !important; font-family: monospace; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="controls">
        <div class="label" id="year-display">Year: ----</div>
        <input type="range" id="slider" min="0" value="0" step="1">
        <button id="sync-btn" class="btn">Force Sync Telemetry</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-measure/3.1.0/leaflet-measure.min.js"></script>
    
    <script>
        // 1. Initialize Map
        var map = L.map('map').setView([40.0, 15.0], 4);

        L.tileLayer('tiles/{z}/{x}/{y}.jpg', {
            minZoom: 0, maxZoom: 8, noWrap: true, bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        // 2. Add GM Measurement Ruler (Logistics Calculator)
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'kilometers',
            secondaryLengthUnit: 'miles',
            activeColor: '#ff5124',
            completedColor: '#3fe0c2'
        });
        measureControl.addTo(map);

        // 3. Icon Dictionary (Expanded for Orthogonal War Artifacts)
        var customIcons = {
            "capital": L.icon({ iconUrl: 'art/Capital_Icon.png', iconSize: [30, 30] }),
            "city": L.icon({ iconUrl: 'art/City_Icon.png', iconSize: [20, 20] }),
            "wonder": L.icon({ iconUrl: 'art/Wonder_Icon.png', iconSize: [35, 35] }),
            
            // War Artifacts
            "sabotage": L.icon({ iconUrl: 'art/Sabotage_Icon.png', iconSize: [25, 25] }),
            "strategic_bombardment": L.icon({ iconUrl: 'art/Bomb_Icon.png', iconSize: [30, 30] }),
            "last_stand": L.icon({ iconUrl: 'art/Shield_Icon.png', iconSize: [28, 28] }),
            "mutiny": L.icon({ iconUrl: 'art/Mutiny_Icon.png', iconSize: [25, 25] }),
            "naval_blockade": L.icon({ iconUrl: 'art/Blockade_Icon.png', iconSize: [30, 30] })
        };

        // 4. Create Empty Layer Groups for Toggling
        var bordersLayer = L.layerGroup().addTo(map);
        var citiesLayer = L.layerGroup().addTo(map);
        var frontlinesLayer = L.layerGroup().addTo(map);

        // 5. Build Layer Control Box
        var overlays = {
            "National Borders": bordersLayer,
            "Cities & Infrastructure": citiesLayer,
            "Active Frontlines & War": frontlinesLayer
        };
        L.control.layers(null, overlays, {position: 'topright'}).addTo(map);

        // Timeline Setup
        var availableYears = [1980, 1983, 1989, 1990, 1992];
        var slider = document.getElementById('slider');
        slider.max = availableYears.length - 1;

        // --- Core Multi-Fetch Engine ---
        function updateMap(year) {
            document.getElementById('year-display').innerText = "Year: " + year;
            
            // Clear the board
            bordersLayer.clearLayers();
            citiesLayer.clearLayers();
            frontlinesLayer.clearLayers();

            var baseDataUrl = year + '_data.geojson?nocache=' + new Date().getTime();
            var frontlineUrl = 'frontlines.geojson?nocache=' + new Date().getTime(); // Always pulls the latest war file

            // Fetch both files simultaneously
            Promise.all([
                fetch(baseDataUrl).then(res => res.ok ? res.json() : null).catch(() => null),
                fetch(frontlineUrl).then(res => res.ok ? res.json() : null).catch(() => null)
            ]).then(([baseData, warData]) => {
                
                // --- Process Base Data (Borders & Cities) ---
                if (baseData) {
                    L.geoJSON(baseData, {
                        style: function(f) { return { color: f.properties.color || "#3fe0c2", weight: 2, fillOpacity: 0.2 }; },
                        pointToLayer: function(f, latlng) {
                            var icon = customIcons[f.properties.marker_type] || customIcons["city"];
                            return L.marker(latlng, { icon: icon });
                        },
                        onEachFeature: function(f, layer) {
                            if (f.geometry.type === "Point") { citiesLayer.addLayer(layer); } 
                            else { bordersLayer.addLayer(layer); }
                            
                            if (f.properties.name) {
                                layer.bindPopup("<h3 style='color:#010505;margin:0;'>" + f.properties.name + "</h3><p style='color:#333;margin-top:5px;'>" + (f.properties.description || "") + "</p>");
                            }
                        }
                    });
                }

                // --- Process War Data (Grey-zones & Marching Ants) ---
                if (warData) {
                    L.geoJSON(warData, {
                        style: function(f) {
                            var styleDef = { color: f.properties.color || "#ff5124", weight: 3, fillOpacity: 0.4 };
                            
                            // Apply Marching Ants animation to offensive lines!
                            if (f.geometry.type === "LineString" && f.properties.type === "offensive_axis") {
                                styleDef.className = 'marching-ants';
                                styleDef.weight = 4;
                            }
                            return styleDef;
                        },
                        pointToLayer: function(f, latlng) {
                            var icon = customIcons[f.properties.marker_type] || customIcons["sabotage"]; // Defaults to sabotage if missing
                            return L.marker(latlng, { icon: icon });
                        },
                        onEachFeature: function(f, layer) {
                            frontlinesLayer.addLayer(layer); // Everything from this file goes to the war layer
                            if (f.properties.name) {
                                layer.bindPopup("<h3 style='color:#ff5124;margin:0;'>" + f.properties.name + "</h3><p style='color:#333;margin-top:5px;'>" + (f.properties.description || "") + "</p>");
                            }
                        }
                    });
                }
            });
        }

        slider.addEventListener('input', function(e) {
            updateMap(availableYears[parseInt(e.target.value)]);
        });

        document.getElementById('sync-btn').addEventListener('click', function() {
            updateMap(availableYears[parseInt(slider.value)]); 
        });

        // Boot
        updateMap(availableYears[0]);
    </script>
</body>
</html>
