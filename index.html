<!DOCTYPE html>
<html>
<head>
    <title>R&F Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* The aesthetic styling */
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 90vh; width: 100vw; }
        #controls { height: 10vh; display: flex; align-items: center; justify-content: center; background: #111; border-top: 2px solid #333; }
        #slider { width: 60%; margin: 0 20px; cursor: pointer; }
        .label { font-size: 1.5rem; font-weight: bold; width: 150px; text-align: center; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="controls">
        <div class="label" id="tick-display">Tick: 1</div>
        <input type="range" id="slider" min="1" max="10" value="1" step="1">
        <button id="sync-btn" style="padding: 10px; margin-left: 20px; cursor: pointer; background: #336699; color: white; border: none; border-radius: 5px; font-weight: bold;">Refresh Map</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map
        var map = L.map('map').setView([40.0, 15.0], 4);

        // 2. Custom QGIS Base Layer
        L.tileLayer('tiles/{z}/{x}/{y}.jpg', {
            minZoom: 0,
            maxZoom: 8, 
            noWrap: true, 
            bounds: [
                [-90, -180], 
                [90, 180]    
            ]
        }).addTo(map);

        // --- NEW: Custom Marker Dictionary ---
        // This tells the map exactly where to look in your GitHub repository for the images
        var customIcons = {
            "capital": L.icon({ iconUrl: 'art/Capital_Icon.png', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] }),
            "city": L.icon({ iconUrl: 'art/City_Icon.png', iconSize: [20, 20], iconAnchor: [10, 20], popupAnchor: [0, -20] }),
            "wonder": L.icon({ iconUrl: 'art/Wonder_Icon.png', iconSize: [35, 35], iconAnchor: [17, 35], popupAnchor: [0, -35] }),
            "holy_site": L.icon({ iconUrl: 'art/HolySite_Icon.png', iconSize: [25, 25], iconAnchor: [12, 25], popupAnchor: [0, -25] }),
            "chokepoint": L.icon({ iconUrl: 'art/Chokepoint_Icon.png', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30] })
        };
        
        var geojsonLayer;
        var mapData;

        // 3. Fetch custom data (with cache-busting restored!)
        fetch('data.geojson?nocache=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                mapData = data;
                
                let maxTick = 1;
                data.features.forEach(f => {
                    if (f.properties.end_tick > maxTick) maxTick = f.properties.end_tick;
                });
                document.getElementById('slider').max = maxTick;

                updateMap(1); 
            });

        // 4. Filter and Draw
        function updateMap(tick) {
            document.getElementById('tick-display').innerText = "Tick: " + tick;
            
            if (geojsonLayer) {
                map.removeLayer(geojsonLayer);
            }

            var filteredData = {
                "type": "FeatureCollection",
                "features": mapData.features.filter(f => 
                    tick >= f.properties.start_tick && tick <= f.properties.end_tick
                )
            };

            geojsonLayer = L.geoJSON(filteredData, {
                // How to draw Borders (Polygons)
                style: function(feature) {
                    return {
                        color: feature.properties.color || "#ffaa00", 
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.3
                    };
                },
                // --- NEW: How to draw Markers (Points) ---
                pointToLayer: function(feature, latlng) {
                    // Check the geojson for a "marker_type" (e.g., "holy_site"). Default to "city" if empty.
                    var type = feature.properties.marker_type || "city";
                    var selectedIcon = customIcons[type] || customIcons["city"]; 
                    return L.marker(latlng, { icon: selectedIcon });
                },
                // Popups for both Borders AND Markers
                onEachFeature: function(feature, layer) {
                    if (feature.properties && feature.properties.name) {
                        let popupHtml = "<h3 style='color:black; margin:0;'>" + feature.properties.name + "</h3>";
                        // Added optional description support for flavor text on markers
                        if (feature.properties.description) {
                            popupHtml += "<p style='color:black; margin-top:5px; font-size:14px;'>" + feature.properties.description + "</p>";
                        }
                        layer.bindPopup(popupHtml);
                    }
                }
            }).addTo(map);
        }

        // 5. Controls
        document.getElementById('slider').addEventListener('input', function(e) {
            updateMap(parseInt(e.target.value));
        });

        // Fixed Button Logic
        document.getElementById('sync-btn').addEventListener('click', function() {
            window.location.reload(true); 
        });
    </script>
</body>
</html>
